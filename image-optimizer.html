<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Optimizer - 이미지 최적화 도구</title>
    <meta name="description" content="웹사이트 최적화를 위한 이미지 압축 도구. 품질을 유지하면서 파일 크기를 줄입니다.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --secondary-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --success-gradient: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --dark-bg: #0f0f23;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --shadow-lg: 0 20px 60px rgba(0, 0, 0, 0.3);
            --shadow-xl: 0 30px 80px rgba(0, 0, 0, 0.4);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--dark-bg);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 50%, rgba(102, 126, 234, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(118, 75, 162, 0.15) 0%, transparent 50%);
            animation: gradientShift 15s ease infinite;
            z-index: 0;
        }

        @keyframes gradientShift {

            0%,
            100% {
                transform: translate(0, 0) rotate(0deg);
            }

            50% {
                transform: translate(-10%, -10%) rotate(180deg);
            }
        }

        .container {
            max-width: 1200px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .subtitle {
            font-size: 1.125rem;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .main-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: var(--shadow-lg);
            animation: fadeInUp 0.8s ease 0.2s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .upload-zone {
            border: 2px dashed var(--card-border);
            border-radius: 16px;
            padding: 3rem 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.02);
            position: relative;
            overflow: hidden;
        }

        .upload-zone::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent);
            transition: left 0.5s ease;
        }

        .upload-zone:hover::before {
            left: 100%;
        }

        .upload-zone:hover {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.05);
            transform: translateY(-2px);
        }

        .upload-zone.dragover {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.1);
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.6;
        }

        .upload-text {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .upload-hint {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        #fileInput {
            display: none;
        }

        .controls {
            margin-top: 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .control-group {
            background: rgba(255, 255, 255, 0.03);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .control-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
            font-weight: 500;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .control-value {
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--primary-gradient);
            cursor: pointer;
            box-shadow: 0 2px 10px rgba(102, 126, 234, 0.5);
            transition: transform 0.2s ease;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--primary-gradient);
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 10px rgba(102, 126, 234, 0.5);
            transition: transform 0.2s ease;
        }

        input[type="range"]::-moz-range-thumb:hover {
            transform: scale(1.2);
        }

        .preview-section {
            margin-top: 2rem;
            display: none;
        }

        .preview-section.active {
            display: block;
            animation: fadeInUp 0.5s ease;
        }

        .preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .preview-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .preview-title {
            font-weight: 600;
            margin-bottom: 1rem;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .preview-image-container {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 1rem;
            background: rgba(0, 0, 0, 0.2);
        }

        .preview-image {
            width: 100%;
            height: auto;
            display: block;
        }

        .preview-stats {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.875rem;
        }

        .stat-label {
            color: var(--text-secondary);
        }

        .stat-value {
            font-weight: 600;
        }

        .stat-value.success {
            color: #00f2fe;
        }

        .button-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            min-width: 200px;
            padding: 1rem 2rem;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s ease, height 0.6s ease;
        }

        .btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn span {
            position: relative;
            z-index: 1;
        }

        .btn-primary {
            background: var(--primary-gradient);
            color: white;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(102, 126, 234, 0.6);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .savings-badge {
            display: inline-block;
            background: var(--success-gradient);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.875rem;
            margin-top: 1rem;
            animation: pulse 2s ease infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }
        }

        footer {
            margin-top: 3rem;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            .main-card {
                padding: 1.5rem;
            }

            .upload-zone {
                padding: 2rem 1rem;
            }

            .controls {
                grid-template-columns: 1fr;
            }

            .preview-grid {
                grid-template-columns: 1fr;
            }

            .btn {
                min-width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>🖼️ Image Optimizer</h1>
            <p class="subtitle">웹사이트 최적화를 위한 이미지 압축 도구</p>
        </header>

        <div class="main-card">
            <div class="upload-zone" id="uploadZone">
                <div class="upload-icon">📁</div>
                <div class="upload-text">이미지를 드래그하거나 클릭하여 업로드</div>
                <div class="upload-hint">JPG, PNG, WebP 지원 | 여러 파일 동시 업로드 가능</div>
                <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp" multiple>
            </div>

            <div class="controls">
                <div class="control-group">
                    <div class="control-label">
                        <span>품질 (Quality)</span>
                        <span class="control-value" id="qualityValue">80%</span>
                    </div>
                    <input type="range" id="qualitySlider" min="10" max="100" value="80">
                </div>

                <div class="control-group">
                    <div class="control-label">
                        <span>최대 너비 (Max Width)</span>
                        <span class="control-value" id="widthValue">1920px</span>
                    </div>
                    <input type="range" id="widthSlider" min="320" max="3840" step="80" value="1920">
                </div>

                <div class="control-group">
                    <div class="control-label">
                        <span>출력 형식 (Format)</span>
                        <span class="control-value" id="formatValue">WebP</span>
                    </div>
                    <select id="formatSelect"
                        style="width: 100%; padding: 0.5rem; border-radius: 8px; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.1); color: white; font-family: 'Inter', sans-serif;">
                        <option value="image/webp">WebP (권장)</option>
                        <option value="image/jpeg">JPEG</option>
                        <option value="image/png">PNG</option>
                    </select>
                </div>
            </div>

            <div class="preview-section" id="previewSection">
                <div class="preview-grid" id="previewGrid"></div>

                <div class="button-group">
                    <button class="btn btn-primary" id="downloadBtn">
                        <span>📦 모든 이미지 일괄 다운로드</span>
                    </button>
                    <button class="btn btn-secondary" id="resetBtn">
                        <span>🔄 새로운 이미지 업로드</span>
                    </button>
                </div>
            </div>
        </div>

        <footer>
            <p>© 2025 Image Optimizer | 웹사이트 성능 향상을 위한 도구</p>
        </footer>
    </div>

    <script>
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');
        const qualitySlider = document.getElementById('qualitySlider');
        const qualityValue = document.getElementById('qualityValue');
        const widthSlider = document.getElementById('widthSlider');
        const widthValue = document.getElementById('widthValue');
        const formatSelect = document.getElementById('formatSelect');
        const formatValue = document.getElementById('formatValue');
        const previewSection = document.getElementById('previewSection');
        const previewGrid = document.getElementById('previewGrid');
        const downloadBtn = document.getElementById('downloadBtn');
        const resetBtn = document.getElementById('resetBtn');

        let originalFiles = [];
        let optimizedBlobs = [];

        // Event Listeners
        uploadZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', handleFiles);

        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('dragover');
        });

        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('dragover');
        });

        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            const files = Array.from(e.dataTransfer.files).filter(file =>
                file.type.startsWith('image/')
            );
            if (files.length > 0) {
                fileInput.files = e.dataTransfer.files;
                handleFiles({ target: { files } });
            }
        });

        qualitySlider.addEventListener('input', (e) => {
            qualityValue.textContent = e.target.value + '%';
            if (originalFiles.length > 0) {
                processImages();
            }
        });

        widthSlider.addEventListener('input', (e) => {
            widthValue.textContent = e.target.value + 'px';
            if (originalFiles.length > 0) {
                processImages();
            }
        });

        formatSelect.addEventListener('change', (e) => {
            const formats = {
                'image/webp': 'WebP',
                'image/jpeg': 'JPEG',
                'image/png': 'PNG'
            };
            formatValue.textContent = formats[e.target.value];
            if (originalFiles.length > 0) {
                processImages();
            }
        });

        downloadBtn.addEventListener('click', downloadAllImages);
        resetBtn.addEventListener('click', reset);

        function handleFiles(e) {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;

            originalFiles = files;
            processImages();
        }

        async function processImages() {
            previewGrid.innerHTML = '';
            optimizedBlobs = [];
            previewSection.classList.add('active');

            for (let i = 0; i < originalFiles.length; i++) {
                const file = originalFiles[i];
                await processImage(file, i);
            }
        }

        async function processImage(file, index) {
            const quality = qualitySlider.value / 100;
            const maxWidth = parseInt(widthSlider.value);
            const outputFormat = formatSelect.value;

            // Create image element
            const img = new Image();
            const reader = new FileReader();

            reader.onload = (e) => {
                img.src = e.target.result;
            };

            img.onload = () => {
                // Calculate new dimensions
                let width = img.width;
                let height = img.height;

                if (width > maxWidth) {
                    height = (height * maxWidth) / width;
                    width = maxWidth;
                }

                // Create canvas
                const canvas = document.createElement('canvas');
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');

                // Draw image
                ctx.drawImage(img, 0, 0, width, height);

                // Convert to blob
                canvas.toBlob((blob) => {
                    optimizedBlobs[index] = blob;
                    displayPreview(file, blob, img.src, index);
                }, outputFormat, quality);
            };

            reader.readAsDataURL(file);
        }

        function displayPreview(originalFile, optimizedBlob, originalSrc, index) {
            const originalSize = originalFile.size;
            const optimizedSize = optimizedBlob.size;
            const savings = ((originalSize - optimizedSize) / originalSize * 100).toFixed(1);

            const previewCard = document.createElement('div');
            previewCard.className = 'preview-card';

            const extension = formatSelect.value.split('/')[1];
            const fileName = originalFile.name.replace(/\.[^/.]+$/, '') + '.' + extension;

            previewCard.innerHTML = `
                <div class="preview-title">이미지 ${index + 1}: ${fileName}</div>
                <div class="preview-image-container">
                    <img src="${originalSrc}" alt="Preview" class="preview-image">
                </div>
                <div class="preview-stats">
                    <div class="stat-row">
                        <span class="stat-label">원본 크기:</span>
                        <span class="stat-value">${formatBytes(originalSize)}</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">최적화 크기:</span>
                        <span class="stat-value success">${formatBytes(optimizedSize)}</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">절감률:</span>
                        <span class="stat-value success">${savings}% 감소</span>
                    </div>
                </div>
                ${savings > 0 ? `<div class="savings-badge">✨ ${formatBytes(originalSize - optimizedSize)} 절약!</div>` : ''}
            `;

            // Add individual download button
            const downloadBtn = document.createElement('button');
            downloadBtn.className = 'btn btn-primary';
            downloadBtn.style.marginTop = '1rem';
            downloadBtn.style.width = '100%';
            downloadBtn.innerHTML = '<span>💾 이 이미지 다운로드</span>';
            downloadBtn.onclick = () => downloadSingleImage(optimizedBlob, fileName);
            previewCard.appendChild(downloadBtn);

            previewGrid.appendChild(previewCard);
        }

        function downloadSingleImage(blob, fileName) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function formatBytes(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round((bytes / Math.pow(k, i)) * 100) / 100 + ' ' + sizes[i];
        }

        function downloadAllImages() {
            const extension = formatSelect.value.split('/')[1];

            optimizedBlobs.forEach((blob, index) => {
                if (blob) {
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    // Preserve original filename, only change extension
                    const originalName = originalFiles[index].name.replace(/\.[^/.]+$/, '');
                    a.download = `${originalName}.${extension}`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                }
            });
        }

        function reset() {
            originalFiles = [];
            optimizedBlobs = [];
            previewGrid.innerHTML = '';
            previewSection.classList.remove('active');
            fileInput.value = '';
        }
    </script>
</body>

</html>
